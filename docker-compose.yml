services:
  postgres:
    image: postgres:17
    container_name: homelab-builder-db
    environment:
      POSTGRES_USER: ${DB_USER:-homelab}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-homelab_password}
      POSTGRES_DB: ${DB_NAME:-homelab_builder}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    image: ${HLBUILDER_IMAGE:-butterski/homelab-builder}:${HLBUILDER_TAG:-latest}
    container_name: homelab-builder-app
    ports:
      - ${FRONTEND_PORT:-3000}:80
    environment:
      SERVER_PORT: "8080"
      PORT: "8081"
      IPAM_URL: http://127.0.0.1:8081
      GIN_MODE: ${GIN_MODE:-debug}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-homelab}
      DB_PASSWORD: ${DB_PASSWORD:-homelab_password}
      DB_NAME: ${DB_NAME:-homelab_builder}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_TYPE: postgres
      JWT_SECRET: ${JWT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      TZ: ${TZ:-Europe/Berlin}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
