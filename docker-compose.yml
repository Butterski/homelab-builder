services:
  postgres:
    image: postgres:17
    container_name: homelab-builder-db
    environment:
      POSTGRES_USER: homelab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: homelab_builder
    volumes:
      - ${DB_PATH}:/var/lib/postgresql/data:rw
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelab -d homelab_builder"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homelab-builder-backend
    ports:
      - ${BACKEND_PORT}:8080
    environment:
      SERVER_PORT: "8080"
      # GIN_MODE: "release"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: homelab
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: homelab_builder
      DB_SSLMODE: disable
      DB_TYPE: postgres
      #JWT_SECRET: ${JWT_SECRET}
      #GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      IPAM_URL: http://hlbipam:8081
      TIMEZONE: Europe/Berlin
    depends_on:
      postgres:
        condition: service_healthy
      hlbipam:
        condition: service_started
    restart: unless-stopped

  hlbipam:
    build:
      context: ./hlbipam
      dockerfile: Dockerfile
    container_name: homelab-builder-ipam
    environment:
      PORT: "8081"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://${IP_ADRESS}:${BACKEND_PORT}}
        #VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: homelab-builder-frontend
    ports:
      - ${FRONTEND_PORT}:80
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      TIMEZONE: Europe/Berlin
