server {
    listen 80;
    server_name hlbldr.com localhost;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location = /docs {
        return 308 /docs/;
    }

    location = /docs/articles {
        return 308 /docs/articles/;
    }

    location ~ ^(/docs/(?:homelab-network-planning|homelab-hardware-sizing|self-hosted-service-planning|articles/[a-z0-9-]+))$ {
        return 308 $1/;
    }

    location = /docs/docs.css {
        try_files $uri =404;
    }

    location ^~ /docs/visuals/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /docs/ {
        try_files $uri/index.html =404;
    }

    location ^~ /shared/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(builder|admin|profile|generate|checklist|donate)(/|$) {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend:8080;
    }
}
